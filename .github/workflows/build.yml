name: Build and Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install pywin32 psutil Pillow opencv-python numpy keyboard PyQt6
          pip install paddlepaddle paddleocr

      - name: Build with PyInstaller
        run: |
          python -m PyInstaller --noconfirm --windowed --name CurrencyWar --add-data "res;res" main.py

      - name: Package artifact
        run: |
          Compress-Archive -Path dist/CurrencyWar/* -DestinationPath CurrencyWar-${{ github.ref_name }}.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: CurrencyWar-${{ github.ref_name }}.zip
          generate_release_notes: true
